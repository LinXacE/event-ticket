{% extends "base_auth.html" %}

{% block title %}Admin Login - SmartEvents{% endblock %}

{% block content %}
<div class="min-vh-100 d-flex align-items-center" style="background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card border-0 shadow-lg" style="border-radius: 14px;">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <i class="fas fa-user-shield fa-3x text-primary mb-3"></i>
                            <h3 class="fw-bold mb-1">Admin Portal</h3>
                            <p class="text-muted mb-0">SmartEvents Administration Login</p>
                        </div>

                        <form method="POST" action="{{ url_for('rbac.admin_login') }}">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Admin Username</label>
                                <input type="text"
                                       class="form-control form-control-lg"
                                       name="username"
                                       placeholder="Enter admin username"
                                       required>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-semibold">Password</label>
                                <input type="password"
                                       class="form-control form-control-lg"
                                       name="password"
                                       placeholder="Enter admin password"
                                       required>
                            </div>

                            <button type="submit" class="btn btn-primary btn-lg w-100">
                                <i class="fas fa-sign-in-alt me-2"></i>Login as Admin
                            </button>
                        </form>

                        <hr class="my-4">
                        <div class="text-center">
                            <a href="{{ url_for('auth.login') }}" class="text-decoration-none">
                                <i class="fas fa-arrow-left me-1"></i>Back to User Login
                            </a>
                        </div>
                    </div>
                </div>
                <div class="text-center mt-3 text-white">
                    <small>University Project Admin Access</small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
